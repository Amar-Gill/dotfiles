"$schema" = 'https://starship.rs/config-schema.json'

format = """
[έΨΣέΨΤέΨΥ](#a3aed2)\
[ ΌεΣ ](bg:#a3aed2 fg:#090c0c)\
[Ώθφδ](bg:#769ff0 fg:#a3aed2)\
$directory\
[Ώθφδ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[Ώθφδ](fg:#394260 bg:#212736)\
$nodejs\
$bun\
$rust\
$golang\
$php\
$kubernetes\
[Ώθφδ](fg:#212736 bg:#1d2230)\
$jobs\
$time\
[Ώθφδ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "

[git_branch]
symbol = "ΎΡα"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "Όεα"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[bun]
symbol = "Όζψ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "ΌαΙ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[kubernetes]
disabled=false
symbol = "έα╕"
style = "bg:#212736"
format = '[[ $symbol ($context)(\($namespace\)) ](fg:#769ff0 bg:#212736)]($style)'

[jobs]
style = "bg:#1d2230"
format = "[ $symbol$number]($style)"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ΎΡ║ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
